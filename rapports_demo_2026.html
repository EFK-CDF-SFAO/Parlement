<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - Rapports CDF sur cartes (Session 2026)</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Badge rapport CDF sur la carte */
        .rapport-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: linear-gradient(135deg, #EA5A4F 0%, #c94a40 100%);
            color: white;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .rapport-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(234, 90, 79, 0.4);
            color: white;
        }
        
        .rapport-badge .pa-icon {
            font-size: 0.85rem;
        }
        
        /* Indicateur de matching dans le header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .card-badges {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        /* Info rapport sous le texte */
        .rapport-info {
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: #fff8f7;
            border-left: 3px solid #EA5A4F;
            border-radius: 0 4px 4px 0;
            font-size: 0.85rem;
        }
        
        .rapport-info-title {
            font-weight: 600;
            color: #EA5A4F;
            margin-bottom: 0.25rem;
        }
        
        .rapport-info-meta {
            color: #666;
            font-size: 0.8rem;
        }
        
        .rapport-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        
        .rapport-keyword {
            background: #fce4e1;
            color: #c94a40;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
        }
        
        /* Header de la demo */
        .demo-header {
            background: #EA5A4F;
            color: white;
            padding: 1rem 2rem;
            margin-bottom: 1rem;
        }
        
        .demo-header h2 {
            margin: 0;
            font-size: 1.1rem;
        }
        
        .demo-header p {
            margin: 0.25rem 0 0;
            opacity: 0.9;
            font-size: 0.85rem;
        }
        
        .demo-stats {
            display: flex;
            gap: 2rem;
            margin-top: 0.75rem;
            font-size: 0.9rem;
        }
        
        .demo-stats span {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
        }
        
        /* Score indicator */
        .match-score {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            margin-left: 0.25rem;
        }
    </style>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(r=>r.unregister()));caches.keys().then(n=>n.forEach(n=>caches.delete(n)));}</script>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="header-main">
                <h1><a href="home.html" style="color: inherit; text-decoration: none;">🏛️ Le CDF aux Chambres fédérales</a></h1>
                <nav>
                    <a href="home.html">Accueil</a>
                    <a href="objects.html">Objets</a>
                    <a href="debates.html">Débats</a>
                    <a href="stats.html">Statistiques</a>
                </nav>
            </div>
        </div>
    </header>
    
    <div class="demo-header">
        <div class="container">
            <h2>🔬 Démo : Numéro de rapport CDF sur les cartes</h2>
            <p>Session 2026 - Correspondances automatiques entre débats et rapports CDF</p>
            <div class="demo-stats">
                <span id="totalDebates">-</span>
                <span id="matchedDebates">-</span>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="results-section">
            <div class="results-header">
                <span id="resultsCount">Chargement...</span>
            </div>
            <div id="results" class="results-grid"></div>
        </section>
    </main>

    <script>
        const councilLabels = {
            'N': 'Conseil national',
            'S': 'Conseil des États'
        };
        
        let debatesData = [];
        let matchesData = {};
        let rapportsData = {};
        
        async function loadData() {
            try {
                const [debatesRes, matchesRes, rapportsRes] = await Promise.all([
                    fetch('debates_data.json'),
                    fetch('rapports_matches.json'),
                    fetch('rapports_cdf.json')
                ]);
                
                const debates = await debatesRes.json();
                matchesData = await matchesRes.json();
                const rapports = await rapportsRes.json();
                
                // Index rapports par ID
                rapportsData = {};
                rapports.items.forEach(r => rapportsData[r.id] = r);
                
                // Créer index des matches par debate_id
                const matchesByDebate = {};
                
                // Matches par PA
                (matchesData.by_pa_number?.debates || []).forEach(m => {
                    matchesByDebate[m.debate_id] = { ...m, type: 'pa' };
                });
                
                // Matches par mots-clés ou office
                (matchesData.by_keywords?.debates || []).forEach(m => {
                    if (!matchesByDebate[m.debate_id]) {
                        matchesByDebate[m.debate_id] = { ...m, type: m.match_type || 'keywords' };
                    }
                });
                
                // Filtrer débats 2026
                debatesData = debates.items.filter(d => {
                    const date = d.date?.toString() || '';
                    return date.startsWith('2025') || date.startsWith('2026');
                });
                
                // Enrichir avec les matches
                debatesData = debatesData.map(d => {
                    const match = matchesByDebate[d.id];
                    if (match) {
                        d.rapport_match = match;
                        // Récupérer les infos du rapport
                        if (match.rapport_id && rapportsData[match.rapport_id]) {
                            d.rapport = rapportsData[match.rapport_id];
                        }
                        // Pour les matches PA, chercher le rapport correspondant
                        if (match.pa_numbers?.length > 0) {
                            const pa = match.pa_numbers[0];
                            const rapport = rapports.items.find(r => r.pa_numbers?.includes(pa));
                            if (rapport) d.rapport = rapport;
                        }
                    }
                    return d;
                });
                
                // Stats
                const matched = debatesData.filter(d => d.rapport_match).length;
                document.getElementById('totalDebates').textContent = `${debatesData.length} débats en 2025-2026`;
                document.getElementById('matchedDebates').textContent = `${matched} avec rapport CDF identifié`;
                
                renderResults();
            } catch (err) {
                document.getElementById('results').innerHTML = `<p>Erreur: ${err.message}</p>`;
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return dateStr;
            return `${dateStr.substring(6,8)}.${dateStr.substring(4,6)}.${dateStr.substring(0,4)}`;
        }
        
        function highlightCDF(text) {
            let result = text
                .replace(/\[[^\]]*\]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            
            result = result.replace(/\bCDF\b/g, '<mark class="highlight">CDF</mark>');
            result = result.replace(/\bEFK\b/g, '<mark class="highlight">EFK</mark>');
            return result;
        }
        
        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card debate-card';
            
            const councilDisplay = councilLabels[item.council] || item.council;
            const textPreview = item.text.length > 350 ? item.text.substring(0, 350) + '...' : item.text;
            
            // Badge rapport si match trouvé
            let rapportBadge = '';
            let rapportInfo = '';
            
            if (item.rapport_match) {
                const match = item.rapport_match;
                const rapport = item.rapport;
                
                if (match.type === 'pa' && match.pa_numbers?.length > 0) {
                    // Match par numéro PA - haute confiance
                    const paNum = match.pa_numbers[0];
                    const rapportUrl = rapport?.url || `https://www.efk.admin.ch/?s=${paNum}`;
                    rapportBadge = `
                        <a href="${rapportUrl}" target="_blank" class="rapport-badge" title="Rapport CDF mentionné directement">
                            <span class="pa-icon">📋</span>
                            PA ${paNum}
                        </a>
                    `;
                } else if (match.type === 'office' && rapport) {
                    // Match par office dans le texte - bonne confiance
                    const paNum = match.rapport_pa?.[0] || rapport.pa_numbers?.[0] || '';
                    const rapportUrl = rapport.url || '#';
                    const score = match.score || 0;
                    rapportBadge = `
                        <a href="${rapportUrl}" target="_blank" class="rapport-badge" style="background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);" title="Rapport CDF identifié par office (${match.rapport_office})">
                            <span class="pa-icon">📋</span>
                            PA ${paNum}
                        </a>
                    `;
                    
                    // Info détaillée sous le texte
                    rapportInfo = `
                        <div class="rapport-info" style="border-left-color: #28a745; background: #f0fff4;">
                            <div class="rapport-info-title" style="color: #28a745;">📋 Rapport CDF (via office: ${match.rapport_office})</div>
                            <div>${rapport.title_de || match.rapport_title || ''}</div>
                            <div class="rapport-info-meta">
                                📅 ${formatDate(rapport.date || match.rapport_date)} · 🏢 ${rapport.office || match.rapport_office || 'N/A'}
                            </div>
                        </div>
                    `;
                } else if (match.type === 'keywords' && rapport) {
                    // Match par mots-clés
                    const paNum = match.rapport_pa?.[0] || rapport.pa_numbers?.[0] || '';
                    const rapportUrl = rapport.url || '#';
                    const score = match.score || 0;
                    rapportBadge = `
                        <a href="${rapportUrl}" target="_blank" class="rapport-badge" title="Rapport CDF potentiel (score ${score})">
                            <span class="pa-icon">📋</span>
                            PA ${paNum}
                            <span class="match-score">~${score}</span>
                        </a>
                    `;
                    
                    // Info détaillée sous le texte
                    rapportInfo = `
                        <div class="rapport-info">
                            <div class="rapport-info-title">📋 Rapport CDF potentiel</div>
                            <div>${rapport.title_de?.substring(0, 100) || match.rapport_title || ''}...</div>
                            <div class="rapport-info-meta">
                                📅 ${formatDate(rapport.date || match.rapport_date)} · 🏢 ${rapport.office || match.rapport_office || 'N/A'}
                            </div>
                            <div class="rapport-keywords">
                                ${(match.common_keywords || []).slice(0, 5).map(k => 
                                    `<span class="rapport-keyword">${k}</span>`
                                ).join('')}
                            </div>
                        </div>
                    `;
                }
            }
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="card-id">${item.business_number || ''}</span>
                    <div class="card-badges">
                        ${rapportBadge}
                        <span class="badge badge-council">${councilDisplay}</span>
                    </div>
                </div>
                <h3 class="card-title">${item.business_title_fr || item.business_title || ''}</h3>
                <div class="card-meta">
                    <span>💬 ${item.speaker} (${item.party || ''}, ${item.canton || ''})</span>
                    <span>📅 ${formatDate(item.date)}</span>
                </div>
                <div class="card-text">${highlightCDF(textPreview)}</div>
                ${rapportInfo}
            `;
            
            return card;
        }
        
        function renderResults() {
            const container = document.getElementById('results');
            container.innerHTML = '';
            
            // Trier : ceux avec match en premier
            const sorted = [...debatesData].sort((a, b) => {
                if (a.rapport_match && !b.rapport_match) return -1;
                if (!a.rapport_match && b.rapport_match) return 1;
                return (b.date || '').localeCompare(a.date || '');
            });
            
            document.getElementById('resultsCount').textContent = 
                `${sorted.length} débats (${sorted.filter(d => d.rapport_match).length} avec rapport CDF)`;
            
            sorted.forEach(item => {
                container.appendChild(createCard(item));
            });
        }
        
        loadData();
    </script>
</body>
</html>
